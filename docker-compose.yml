services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-konferans}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-konferans_password}
      POSTGRES_DB: ${POSTGRES_DB:-konferans}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-konferans} -d ${POSTGRES_DB:-konferans}
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - yes
    volumes:
      - redis_data:/data

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --node-ip=127.0.0.1
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        bind_addresses:
          - "0.0.0.0"
        log_level: info
        rtc:
          tcp_port: 7881
          port_range_start: ${LIVEKIT_RTC_UDP_START:-50000}
          port_range_end: ${LIVEKIT_RTC_UDP_END:-50100}
          use_external_ip: false
        keys:
          "${LIVEKIT_API_KEY:-devkey}": "${LIVEKIT_API_SECRET:-secret}"
        room:
          auto_create: true
          empty_timeout: 300
          max_participants: 200
    ports:
      - "7880:7880/tcp"
      - "7881:7881/tcp"
      - "${LIVEKIT_RTC_UDP_START:-50000}-${LIVEKIT_RTC_UDP_END:-50100}:${LIVEKIT_RTC_UDP_START:-50000}-${LIVEKIT_RTC_UDP_END:-50100}/udp"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      livekit:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: ${API_PORT:-4000}

      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      INVITE_ONLY: ${INVITE_ONLY:-true}
      ALLOW_PUBLIC_REGISTRATION: ${ALLOW_PUBLIC_REGISTRATION:-false}

      CORS_ORIGIN: ${CORS_ORIGIN:-https://konferans.cloud,https://www.konferans.cloud}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-https://konferans.cloud}

      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      LIVEKIT_WS_URL: ${LIVEKIT_WS_URL:-ws://livekit:7880}
      LIVEKIT_PUBLIC_WS_URL: ${LIVEKIT_PUBLIC_WS_URL:-wss://livekit.konferans.cloud}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}

      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}

      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-180}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      MAX_JSON_BODY: ${MAX_JSON_BODY:-2mb}
      BACKUP_DIR: ${BACKUP_DIR:-/backups}

      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-}
    volumes:
      - backups_data:/backups
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.konferans.cloud}
        NEXT_PUBLIC_LIVEKIT_WS_URL: ${LIVEKIT_PUBLIC_WS_URL:-wss://livekit.konferans.cloud}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.konferans.cloud}
      NEXT_PUBLIC_LIVEKIT_WS_URL: ${LIVEKIT_PUBLIC_WS_URL:-wss://livekit.konferans.cloud}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}

volumes:
  postgres_data:
  redis_data:
  backups_data:

networks:
  default:
    external: true
    name: dokploy-network
